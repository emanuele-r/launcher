# Flatpak manifest — also the format the COSMIC Store consumes.
# Build:   flatpak-builder --user --install --force-clean build-dir io.github.lehman.Launcher.yml
# Run:     flatpak run io.github.lehman.Launcher
app-id: io.github.lehman.Launcher
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: io.github.lehman.Launcher

finish-args:
  # The app forces the X11 GDK backend; fallback-x11 + wayland gives XWayland.
  - --socket=fallback-x11
  - --socket=wayland
  - --share=ipc
  - --device=dri
  # AI API calls and the embedded browser need network access.
  - --share=network

modules:
  - name: launcher
    buildsystem: simple
    build-commands:
      - install -Dm755 launcher.py /app/bin/io.github.lehman.Launcher
      - install -Dm644 home.html /app/share/io.github.lehman.Launcher/home.html
      - install -Dm644 io.github.lehman.Launcher.desktop /app/share/applications/io.github.lehman.Launcher.desktop
      - install -Dm644 io.github.lehman.Launcher.metainfo.xml /app/share/metainfo/io.github.lehman.Launcher.metainfo.xml
      - install -Dm644 io.github.lehman.Launcher.svg /app/share/icons/hicolor/scalable/apps/io.github.lehman.Launcher.svg
    sources:
      - type: dir
        path: .
