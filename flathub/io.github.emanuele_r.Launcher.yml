app-id: io.github.emanuele_r.Launcher
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: io.github.emanuele_r.Launcher

finish-args:
  # The app forces the X11 GDK backend; fallback-x11 + wayland gives XWayland.
  - --socket=fallback-x11
  - --socket=wayland
  - --share=ipc
  - --device=dri
  # AI API calls and the embedded browser need network access.
  - --share=network

cleanup:
  - '*.pyc'

modules:
  - name: launcher
    buildsystem: simple
    build-commands:
      - install -Dm755 launcher.py /app/bin/io.github.emanuele_r.Launcher
      - install -Dm644 home.html /app/share/io.github.emanuele_r.Launcher/home.html
      - install -Dm644 io.github.emanuele_r.Launcher.desktop /app/share/applications/io.github.emanuele_r.Launcher.desktop
      - install -Dm644 io.github.emanuele_r.Launcher.metainfo.xml /app/share/metainfo/io.github.emanuele_r.Launcher.metainfo.xml
      - install -Dm644 io.github.emanuele_r.Launcher.svg /app/share/icons/hicolor/scalable/apps/io.github.emanuele_r.Launcher.svg
    sources:
      - type: git
        url: https://github.com/emanuele-r/launcher.git
        tag: v1.0.0
        commit: 1c9c1361f9455ea73ab30abb44c8eaec53658966
